</style></head><body><div class="app"><aside class="sidebar" id="sidebar"><div class="brand"><h1>Panel Restaurante</h1><p>Vista general</p></div><div class="demo-pill"><i></i> Entorno demo · datos ficticios</div><nav class="nav"><button class="active" data-view="dashboard"><span>▦</span>Dashboard</button><button data-view="reservas"><span>▣</span>Reservas<span class="badge">3</span></button><button data-view="sala"><span>▦</span>Sala</button><button data-view="clientes"><span>♙</span>Clientes<span class="badge">4</span></button><button data-view="resenas"><span>◫</span>Reseñas<span class="badge">6</span></button><button data-view="rentabilidad"><span>↗</span>Rentabilidad</button><button data-view="fidelizacion"><span>◇</span>Fidelización</button><div class="divider"></div><button class="nav-head" id="digitalToggle"><span>♨</span>Camarero digital<span class="chev">⌄</span></button><div class="subnav" id="digitalMenu"><button data-view="carta"><span>✦</span>Generar carta</button><button data-view="productos"><span>✎</span>Productos carta</button><button data-view="qr"><span>▧</span>QR mesas</button><button data-view="pedidos"><span>♨</span>Cocina / pedidos</button></div><div class="divider"></div><button data-view="ajustes"><span>⚙</span>Ajustes</button></nav><div class="sidebar-foot"><b>Demo pública de GastroHelp</b><p>La navegación funciona. Crear, editar, borrar y guardar están desactivados.</p></div></aside><div class="overlay" id="overlay"></div><main class="main"><div class="mobilebar"><button id="burger">☰</button><b>Panel Restaurante</b><span></span></div><div class="page" id="page"></div></main></div><div class="toast" id="toast">Acción desactivada en el entorno demo</div><script>
const reservations=[['13:30','Marta García','4','612 445 291','Confirmada','Ha venido'],['14:00','Luis Romero','2','634 881 024','Confirmada','Ha venido'],['20:30','Paula Sánchez','6','688 120 553','Pendiente','Sin marcar'],['21:00','Carlos Mora','3','621 304 789','Confirmada','Sin marcar'],['21:30','Ana Vidal','5','665 409 110','Pendiente','Sin marcar'],['22:00','Javier León','2','698 812 762','Cancelada','No ha venido']];const clients=[['MG','Marta García','612 445 291','12','1.248 €','Recurrente'],['LR','Luis Romero','634 881 024','8','746 €','Recurrente'],['PS','Paula Sánchez','688 120 553','3','284 €','Activo'],['CM','Carlos Mora','621 304 789','1','96 €','Nuevo'],['AV','Ana Vidal','665 409 110','6','532 €','Recurrente'],['JL','Javier León','698 812 762','2','174 €','Activo']];function badge(v){if(v==='Confirmada'||v==='Ha venido'||v==='Activo'||v==='Respondida'||v==='Entregado')return '<span class="status s-green">'+v+'</span>';if(v==='Pendiente'||v==='Sin marcar'||v==='En cocina')return '<span class="status s-yellow">'+v+'</span>';if(v==='Cancelada'||v==='No ha venido')return '<span class="status s-red">'+v+'</span>';return '<span class="status s-grey">'+v+'</span>'}function header(title,sub,buttons=''){return `<div class="header"><div><h2>${title}</h2><div class="eyebrow"><i></i> Panel en tiempo real <span style="color:#cbd5e1">•</span><span style="color:#64748b;font-weight:500">Datos de demostración</span></div>${sub?`<p class="muted" style="margin:9px 0 0">${sub}</p>`:''}</div><div class="tools"><button class="btn icon action">↻</button><button class="btn icon" id="themeBtn">☾</button>${buttons}</div></div>`}function table(headers,rows){return `<div class="card table-card"><div class="table-wrap"><table class="table"><thead><tr>${headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${rows.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('')}</tbody></table></div></div>`}function dashboard(){return header('La Reserva','',`<button class="btn" data-view-jump="estadisticas">Estadísticas</button><button class="btn" data-view-jump="ajustes">Ajustes</button>`)+`<div class="grid4">${[['bluebar','ib-blue','Reservas hoy','24','Total del día'],['greenbar','ib-green','Clientes nuevos','9','Hoy'],['redbar','ib-red','Reseñas pendientes','6','Impacta en Google'],['purplebar','ib-purple','Ocupación','78%','Ocupación total del día']].map((x,i)=>`<div class="card stat"><div class="accent ${x[0]}"></div><div class="stat-row"><div class="iconbox ${x[1]}">${['▣','♙','◫','%'][i]}</div><div><small>${x[2]}</small><strong>${x[3]}</strong><p>${x[4]}</p></div></div></div>`).join('')}</div><div class="grid2"><div class="card section-card"><div class="card-title"><h3>Ocupación de los últimos 7 días</h3><span class="muted">Actualizado ahora</span></div><div class="chart">${[['L',42],['M',58],['X',51],['J',70],['V',64],['S',91],['D',78]].map(x=>`<i class="bar" data-label="${x[0]}" style="height:${x[1]}%"></i>`).join('')}</div></div><div style="display:grid;gap:18px"><div class="card section-card"><div class="card-title"><h3>Acciones recomendadas</h3><span class="status s-green">4 activas</span></div><div class="list">${[['Confirmar 3 reservas pendientes','Antes de las 18:00'],['Contactar 6 reseñas pendientes','Impacta en Google'],['Promocionar el martes','Ocupación prevista 42%']].map((x,i)=>`<div class="list-item"><span class="mini">${i+1}</span><div class="grow"><b>${x[0]}</b><span>${x[1]}</span></div><button class="btn icon action">✓</button></div>`).join('')}</div></div><div class="card section-card"><div class="card-title"><h3>Alertas</h3><span class="status s-red">2</span></div><div class="list"><div class="list-item"><div class="grow"><b>Varias reservas siguen sin confirmar</b><span>Revisa el turno de cena</span></div></div><div class="list-item"><div class="grow"><b>Dos clientes llevan 90 días sin volver</b><span>Oportunidad de recuperación</span></div></div></div></div></div></div>`}function calendarMarkup(){const days=['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];let cells='';for(let i=0;i<35;i++){const n=i<2?29+i:i-1;const faded=i<2||i>31;let ev='';if([4,7,10,12,15,18,19,22,25,26,29].includes(i))ev=`<span class="event">${i%2?'20:30 · 4 pax':'13:30 · 2 pax'}</span>`;if([8,16,23].includes(i))ev+=`<span class="event pending">Pendiente · 6 pax</span>`;cells+=`<div class="day ${faded?'muted-day':''}"><span class="date">${n}</span>${ev}</div>`}return `<div class="calendar"><div class="cal-head">${days.map(x=>`<div>${x}</div>`).join('')}</div><div class="cal-grid">${cells}</div></div>`}function reservasTable(){const rows=reservations.map(r=>[`<b>${r[0]}</b>`,r[1],r[2],r[3],badge(r[4]),badge(r[5]),'<button class="btn action">Ver</button>']);return `<div class="table-wrap"><table class="table"><thead><tr>${['Hora','Cliente','Personas','Teléfono','Estado','Asistencia','Acciones'].map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${rows.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('')}</tbody></table></div>`}function reservas(){return header('Reservas','Calendario, turnos, estados y asistencia.',`<button class="btn primary action">+ Nueva reserva</button>`)+`<div class="card table-card"><div class="table-toolbar"><div class="filters"><input class="input" placeholder="Buscar cliente o teléfono"><button class="btn">Todas</button><button class="btn">Hoy</button><button class="btn">Pendientes</button></div><div class="filters"><button class="btn" id="calBtn">Calendario</button><button class="btn" id="tableBtn">Tabla</button></div></div><div id="reservasContent">${calendarMarkup()}</div></div>`}function sala(){return header('Sala','Vista rápida de mesas y ocupación del turno.',`<button class="btn primary action">+ Añadir mesa</button>`)+`<div class="heading-row"><div><h3>Turno de cena</h3><p>12 mesas · capacidad total 54 personas</p></div><div class="filters"><span class="status s-green">Libre</span><span class="status s-yellow">Reservada</span><span class="status s-grey">Ocupada</span></div></div><div class="card room">${Array.from({length:12},(_,i)=>{const cls=i%4===0?'busy':i%3===0?'reserved':'';const st=cls==='busy'?'Ocupada':cls==='reserved'?'Reservada':'Libre';return `<button class="table-seat ${cls} action"><b>Mesa ${i+1}</b><span>${st}</span><span class="people">${[2,4,6,4][i%4]} plazas</span></button>`}).join('')}</div>`}function clientes(){const rows=clients.map(r=>[`<span class="avatar">${r[0]}</span><b>${r[1]}</b>`,r[2],r[3],r[4],badge(r[5]),'<button class="btn action">Ver ficha</button>']);return header('Clientes','Base de datos, historial y recurrencia.',`<button class="btn primary action">+ Nuevo cliente</button>`)+`<div class="grid3" style="margin-bottom:18px"><div class="card stat"><small>Total clientes</small><strong>1.284</strong><p>Base de datos activa</p></div><div class="card stat"><small>Nuevos este mes</small><strong>74</strong><p>+12 frente al mes anterior</p></div><div class="card stat"><small>Clientes recurrentes</small><strong>41%</strong><p>Han vuelto al menos una vez</p></div></div>${table(['Cliente','Teléfono','Visitas','Gasto total','Segmento','Acción'],rows)}`}function resenas(){return header('Reseñas','Seguimiento de opiniones y respuestas.',`<button class="btn primary action">Solicitar reseña</button>`)+`<div class="grid3" style="margin-bottom:18px"><div class="card stat"><small>Pendientes</small><strong>6</strong><p>Requieren seguimiento</p></div><div class="card stat"><small>Valoración media</small><strong>4,7</strong><p>Últimos 90 días</p></div><div class="card stat"><small>Solicitudes enviadas</small><strong>89</strong><p>Este mes</p></div></div><div class="grid3">${[['Marta García','★★★★★','La atención fue rápida y la comida excelente.','Pendiente'],['Luis Romero','★★★★★','Muy buen ambiente y reserva sencilla.','Respondida'],['Paula Sánchez','★★★★☆','Todo bien, aunque esperamos un poco en el segundo plato.','Pendiente'],['Ana Vidal','★★★★★','Volveremos seguro. El sistema de puntos está genial.','Respondida'],['Carlos Mora','★★★★☆','Buen producto y personal muy amable.','Pendiente'],['Javier León','★★★★★','Experiencia de diez.','Pendiente']].map(x=>`<div class="card review"><div class="review-foot"><b>${x[0]}</b>${badge(x[3])}</div><div class="stars" style="margin:12px 0">${x[1]}</div><p>${x[2]}</p><div class="review-foot"><span class="muted">Google · hace 2 días</span><button class="btn action">Responder</button></div></div>`).join('')}</div>`}function rentabilidad(){const rows=[['Paella valenciana','7,40 €','18,50 €','60%','1.232 €'],['Entrecot premium','13,20 €','29,00 €','54%','948 €'],['Croquetas caseras','2,10 €','9,50 €','78%','724 €'],['Tarta de queso','1,85 €','6,50 €','72%','508 €'],['Pulpo a la brasa','9,60 €','21,00 €','54%','476 €']].map(r=>[r[0],r[1],r[2],`<b style="color:#059669">${r[3]}</b>`,r[4],'<button class="btn action">Editar</button>']);return header('Rentabilidad','Costes, margen y beneficio estimado de la carta.',`<button class="btn primary action">Registrar ventas</button>`)+`<div class="grid3" style="margin-bottom:18px"><div class="card stat"><small>Ventas estimadas</small><strong>18.460 €</strong><p>Mes actual</p></div><div class="card stat"><small>Beneficio estimado</small><strong>11.920 €</strong><p>Margen medio 64,6%</p></div><div class="card section-card"><div class="profit"><div class="donut"></div><div><b>Margen global</b><p class="muted">Coste de producto controlado</p></div></div></div></div>${table(['Plato','Coste','Precio','Margen','Beneficio mes','Acción'],rows)}`}function fidelizacion(){return header('Fidelización','Puntos, cupones y recompensas para clientes.',`<button class="btn primary action">+ Crear cupón</button>`)+`<div class="grid3" style="margin-bottom:18px"><div class="card stat"><small>Clientes inscritos</small><strong>462</strong><p>36% de la base activa</p></div><div class="card stat"><small>Cupones canjeados</small><strong>74</strong><p>Este mes</p></div><div class="card stat"><small>Visitas recuperadas</small><strong>29</strong><p>Campañas automáticas</p></div></div><div class="grid3">${[['BIENVENIDA10','10% de descuento','187 usos','76'],['POSTREGRATIS','Postre gratis en la próxima visita','96 usos','54'],['VUELVE20','20% para clientes inactivos','41 usos','32']].map(x=>`<div class="coupon"><span class="code">${x[0]}</span><h4>${x[1]}</h4><p>${x[2]} · activo</p><div class="progress"><i style="width:${x[3]}%"></i></div><div style="display:flex;justify-content:space-between;align-items:center;margin-top:14px"><span class="status s-green">Activo</span><button class="btn action">Editar</button></div></div>`).join('')}</div>`}function estadisticas(){return header('Estadísticas','Comparativa mensual del rendimiento del restaurante.',`<button class="btn action">Exportar informe</button>`)+`<div class="grid4">${[['Reservas','486','+14%'],['Clientes nuevos','74','+9%'],['Reseñas','42','+21%'],['Beneficio estimado','11.920 €','+8%']].map((x,i)=>`<div class="card stat"><div class="accent ${['bluebar','greenbar','redbar','purplebar'][i]}"></div><small>${x[0]}</small><strong>${x[1]}</strong><p style="color:#059669">${x[2]} frente al mes anterior</p></div>`).join('')}</div><div class="grid2"><div class="card section-card"><div class="card-title"><h3>Evolución mensual</h3><span class="muted">Últimos 6 meses</span></div><div class="chart">${[['Feb',46],['Mar',55],['Abr',62],['May',68],['Jun',74],['Jul',86]].map(x=>`<i class="bar" data-label="${x[0]}" style="height:${x[1]}%"></i>`).join('')}</div></div><div class="card section-card"><div class="card-title"><h3>Origen de reservas</h3></div>${[['Web propia','44%'],['WhatsApp','29%'],['Manual','17%'],['Google','10%']].map(x=>`<div class="list-item"><div class="grow"><b>${x[0]}</b><span>${x[1]}</span><div class="progress"><i style="width:${parseInt(x[1])}%"></i></div></div></div>`).join('')}</div></div>`}function carta(){return header('Generar carta','Crea la primera estructura de la carta del restaurante.',`<button class="btn primary action">Generar carta</button>`)+`<div class="grid2"><div class="card section-card"><div class="heading-row"><div><h3>Configura la carta</h3><p>Describe el estilo y las categorías principales.</p></div></div><div style="display:grid;gap:12px"><label class="muted">Nombre del restaurante<input class="input" style="display:block;width:100%;margin-top:6px" value="La Reserva"></label><label class="muted">Tipo de cocina<input class="input" style="display:block;width:100%;margin-top:6px" value="Mediterránea contemporánea"></label><label class="muted">Categorías<input class="input" style="display:block;width:100%;margin-top:6px" value="Entrantes, arroces, carnes, postres"></label><button class="btn primary action">Crear estructura</button></div></div><div class="card section-card"><h3>Vista previa</h3><p class="muted">La carta generada aparecerá aquí antes de publicarla.</p><div style="margin-top:18px;border:1px dashed #cbd5e1;border-radius:14px;padding:40px;text-align:center;color:#64748b">Vista previa de carta</div></div></div>`}function productos(){return header('Productos carta','Platos, precios, disponibilidad y categorías.',`<button class="btn primary action">+ Añadir plato</button>`)+`<div class="menu-products">${[['🥘','Paella valenciana','Arroces','18,50 €'],['🥩','Entrecot premium','Carnes','29,00 €'],['🥟','Croquetas caseras','Entrantes','9,50 €'],['🍰','Tarta de queso','Postres','6,50 €'],['🐙','Pulpo a la brasa','Entrantes','21,00 €'],['🥗','Ensalada templada','Entrantes','12,00 €'],['🍚','Arroz del senyoret','Arroces','19,50 €'],['🍮','Flan de la casa','Postres','5,50 €']].map(x=>`<div class="card product"><div class="product-img">${x[0]}</div><div class="product-body"><h4>${x[1]}</h4><p>${x[2]} · Disponible</p><strong>${x[3]}</strong><button class="btn action" style="width:100%;margin-top:11px">Editar</button></div></div>`).join('')}</div>`}function qr(){const rows=Array.from({length:10},(_,i)=>[`Mesa ${i+1}`,`QR-${String(i+1).padStart(2,'0')}`,badge('Activo'),'<button class="btn action">Ver QR</button>','<button class="btn action">Descargar</button>']);return header('QR mesas','Códigos vinculados a cada mesa del restaurante.',`<button class="btn primary action">+ Crear mesa</button>`)+table(['Mesa','Código','Estado','Vista','Archivo'],rows)}function pedidos(){const rows=[['#1042','Mesa 6','2× Croquetas, 1× Paella','20:42',badge('En cocina'),'<button class="btn action">Marcar listo</button>'],['#1041','Mesa 3','1× Entrecot, 2× Bebidas','20:38',badge('En cocina'),'<button class="btn action">Marcar listo</button>'],['#1040','Mesa 9','2× Tarta de queso','20:31',badge('Entregado'),'<button class="btn action">Ver</button>']];return header('Cocina / pedidos','Comandas recibidas desde los QR de mesa.',`<button class="btn icon action">🔔</button>`)+table(['Pedido','Mesa','Contenido','Hora','Estado','Acción'],rows)}function ajustes(){return header('Ajustes','Configuración del restaurante y sus módulos.',`<button class="btn primary action">Guardar cambios</button>`)+`<div class="grid2"><div class="card"><div class="setting"><div><b>Datos del restaurante</b><p>Nombre, horarios, aforo y contacto.</p></div><button class="btn action">Editar</button></div><div class="setting"><div><b>Reservas</b><p>Turnos, duración y límites de capacidad.</p></div><button class="btn action">Configurar</button></div><div class="setting"><div><b>Notificaciones</b><p>Avisos de nuevas reservas y cambios.</p></div><span class="switch action"></span></div><div class="setting"><div><b>Modo oscuro</b><p>Apariencia del panel.</p></div><span class="switch" id="themeSwitch"></span></div></div><div class="card"><div class="setting"><div><b>Clientes</b><p>Base de datos e historial.</p></div><span class="switch action"></span></div><div class="setting"><div><b>Reseñas</b><p>Solicitudes automáticas post-visita.</p></div><span class="switch action"></span></div><div class="setting"><div><b>Fidelización</b><p>Puntos, cupones y recompensas.</p></div><span class="switch action"></span></div><div class="setting"><div><b>Camarero digital</b><p>Carta, QR y pedidos a cocina.</p></div><span class="switch action"></span></div></div></div>`}const views={dashboard,reservas,sala,clientes,resenas,rentabilidad,fidelizacion,estadisticas,carta,productos,qr,pedidos,ajustes};const page=document.getElementById('page'),toast=document.getElementById('toast');function showToast(){toast.classList.add('show');clearTimeout(window.toastTimer);window.toastTimer=setTimeout(()=>toast.classList.remove('show'),2200)}function bind(){document.querySelectorAll('.action').forEach(x=>x.addEventListener('click',e=>{e.preventDefault();showToast()}));document.querySelectorAll('[data-view-jump]').forEach(x=>x.addEventListener('click',()=>openView(x.dataset.viewJump)));const t=document.getElementById('themeBtn');if(t)t.onclick=()=>document.documentElement.classList.toggle('dark');const ts=document.getElementById('themeSwitch');if(ts)ts.onclick=()=>document.documentElement.classList.toggle('dark');const cb=document.getElementById('calBtn'),tb=document.getElementById('tableBtn'),rc=document.getElementById('reservasContent');if(cb&&tb&&rc){cb.onclick=()=>rc.innerHTML=calendarMarkup();tb.onclick=()=>rc.innerHTML=reservasTable()}}function openView(name){if(!views[name])name='dashboard';page.innerHTML=views[name]();document.querySelectorAll('.nav button[data-view]').forEach(b=>b.classList.toggle('active',b.dataset.view===name));if(['carta','productos','qr','pedidos'].includes(name)){document.getElementById('digitalMenu').classList.add('open');document.getElementById('digitalToggle').classList.add('open')}document.getElementById('sidebar').classList.remove('open');document.getElementById('overlay').classList.remove('show');window.scrollTo(0,0);bind();location.hash=name}document.querySelectorAll('.nav button[data-view]').forEach(b=>b.onclick=()=>openView(b.dataset.view));document.getElementById('digitalToggle').onclick=()=>{document.getElementById('digitalMenu').classList.toggle('open');document.getElementById('digitalToggle').classList.toggle('open')};document.getElementById('burger').onclick=()=>{document.getElementById('sidebar').classList.add('open');document.getElementById('overlay').classList.add('show')};document.getElementById('overlay').onclick=()=>{document.getElementById('sidebar').classList.remove('open');document.getElementById('overlay').classList.remove('show')};openView(location.hash.replace('#','')||'dashboard');
</script></body></html>
