<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="noindex,nofollow"><meta name="theme-color" content="#090712"><title>Panel demo | GastroHelp</title><style>
:root{--b:#1601ad;--v:#705cff;--g:#2bd39b;--r:#ff6d7c;--a:#ffb84d;--bg:#f5f5fa;--ink:#14121b;--mut:#777382;--line:#e8e6ef;--dark:#0b0914}*{box-sizing:border-box}body{margin:0;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--ink)}button,a{font:inherit}button{cursor:pointer}.app{min-height:100vh;display:grid;grid-template-columns:255px 1fr}.side{position:fixed;inset:0 auto 0 0;width:255px;background:linear-gradient(180deg,#0c0918,#110d22);color:#fff;padding:18px 14px;display:flex;flex-direction:column;border-right:1px solid rgba(255,255,255,.07);z-index:20}.logo{display:flex;align-items:center;gap:10px;font-weight:900;font-size:20px;padding:2px 7px 18px}.logo a{color:#fff;text-decoration:none}.logo em{color:#8c7eff;font-style:normal}.mark{display:inline-grid;place-items:center;width:34px;height:34px;border-radius:11px;background:linear-gradient(145deg,var(--b),var(--v));margin-right:8px}.mark:after{content:"GH";font-size:10px}.restaurant{display:flex;align-items:center;gap:10px;padding:12px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:14px;margin-bottom:14px}.avatar{width:38px;height:38px;border-radius:12px;background:#4b36d8;display:grid;place-items:center;font-weight:900}.restaurant b,.restaurant small{display:block}.restaurant small{color:#827c92;font-size:11px;margin-top:2px}.nav{display:grid;gap:4px}.nav button{display:flex;align-items:center;gap:11px;width:100%;border:0;border-radius:11px;padding:11px 12px;background:transparent;color:#8e899a;text-align:left;font-weight:750}.nav button span{width:22px;text-align:center}.nav button i{margin-left:auto;font-style:normal;font-size:10px;background:#2a2440;padding:4px 7px;border-radius:12px}.nav button:hover,.nav button.active{background:linear-gradient(90deg,rgba(105,82,255,.22),rgba(105,82,255,.06));color:#fff}.nav button.active:before{content:"";width:3px;height:20px;background:#765fff;border-radius:4px;margin-left:-12px}.notice{margin-top:auto;padding:13px;border-radius:13px;background:rgba(112,92,255,.1);border:1px solid rgba(112,92,255,.18)}.notice b{font-size:12px}.notice p{font-size:10px;color:#918a9e;line-height:1.5;margin:5px 0 0}.main{grid-column:2}.top{height:78px;background:rgba(255,255,255,.88);backdrop-filter:blur(16px);border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:12}.top h1{font-size:22px;margin:3px 0}.env{font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:#6f5ae5;font-weight:900}.actions{display:flex;align-items:center;gap:10px}.btn{border:0;border-radius:12px;padding:11px 14px;font-weight:850}.primary{color:#fff;background:linear-gradient(135deg,var(--b),var(--v));box-shadow:0 12px 30px rgba(68,44,225,.24)}.soft{background:#eeecff;color:#4932d7}.burger{display:none}.canvas{padding:24px;max-width:1500px;margin:auto}.headrow{display:flex;justify-content:space-between;align-items:end;margin-bottom:18px}.headrow h2{font-size:30px;letter-spacing:-.04em;margin:4px 0}.headrow p{color:var(--mut);margin:0}.disabled{border:1px solid var(--line);background:#fff;color:#595566}.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:13px}.kpi{background:#fff;border:1px solid var(--line);border-radius:17px;padding:18px;box-shadow:0 10px 30px rgba(28,17,85,.04)}.kpi small{display:block;color:var(--mut);font-size:11px}.kpi strong{display:block;font-size:29px;margin:7px 0 3px;letter-spacing:-.04em}.up{color:#18a978;font-size:11px;font-weight:800}.down{color:#e45667;font-size:11px}.grid2{display:grid;grid-template-columns:1.25fr .75fr;gap:13px;margin-top:13px}.card{background:#fff;border:1px solid var(--line);border-radius:17px;padding:18px}.cardhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:15px}.cardhead h3{font-size:15px;margin:0}.cardhead span{font-size:10px;color:var(--mut)}.chart{height:230px;display:flex;align-items:end;gap:10px;border-bottom:1px solid var(--line);padding:20px 8px 0}.chart i{flex:1;background:linear-gradient(#7965ff,#301cc5);border-radius:6px 6px 2px 2px;position:relative}.chart i:after{content:attr(data-day);position:absolute;bottom:-22px;left:50%;transform:translateX(-50%);font-size:9px;color:#8b8794}.activity{display:flex;gap:10px;align-items:center;padding:11px 0;border-bottom:1px solid #f0eef5}.dot{width:9px;height:9px;border-radius:50%;background:var(--g)}.activity div{flex:1}.activity b,.activity small{display:block}.activity b{font-size:12px}.activity small{color:var(--mut);font-size:10px;margin-top:3px}.tag{font-size:9px;padding:5px 7px;border-radius:10px;background:#ecfff8;color:#118b62}.tablewrap{overflow:auto}.table{width:100%;border-collapse:collapse;min-width:760px}.table th,.table td{text-align:left;padding:13px 10px;border-bottom:1px solid #efedf4;font-size:12px}.table th{font-size:10px;color:#86818f;text-transform:uppercase;letter-spacing:.08em}.status{display:inline-flex;padding:6px 8px;border-radius:10px;font-size:10px;font-weight:800}.ok{background:#e9fff7;color:#0d9466}.wait{background:#fff5df;color:#b87810}.cancel{background:#fff0f2;color:#c13e50}.toolbar{display:flex;gap:8px;flex-wrap:wrap}.filter{border:1px solid var(--line);background:#fff;padding:10px 12px;border-radius:11px;color:#5d5869}.profile{display:flex;align-items:center;gap:10px}.circle{width:37px;height:37px;border-radius:50%;display:grid;place-items:center;background:#e9e5ff;color:#4d35d9;font-weight:900}.cards3{display:grid;grid-template-columns:repeat(3,1fr);gap:13px}.metric{display:flex;align-items:center;gap:12px}.metric .circle{border-radius:12px}.review{padding:16px;border:1px solid var(--line);border-radius:14px;margin-top:10px}.stars{color:#f5aa2c;letter-spacing:2px}.reward{background:linear-gradient(145deg,#130e35,#25166f);color:#fff;border:0}.reward p{color:#aaa3c0}.progress{height:8px;background:rgba(255,255,255,.12);border-radius:10px;overflow:hidden}.progress i{display:block;height:100%;background:linear-gradient(90deg,#705cff,#b5aaff)}.food{display:flex;align-items:center;gap:11px}.foodpic{width:45px;height:45px;border-radius:12px;background:linear-gradient(145deg,#ffb766,#ff7d66)}.barline{height:9px;border-radius:10px;background:#eeeaf8;overflow:hidden}.barline i{display:block;height:100%;background:linear-gradient(90deg,#705cff,#3a25c9)}.settings{display:grid;grid-template-columns:1fr 1fr;gap:13px}.setting{display:flex;align-items:center;justify-content:space-between;padding:15px;border:1px solid var(--line);border-radius:13px;margin-top:9px}.switch{width:42px;height:24px;border-radius:20px;background:#735fff;position:relative}.switch:after{content:"";position:absolute;width:18px;height:18px;border-radius:50%;background:#fff;right:3px;top:3px}.toast{position:fixed;right:20px;bottom:20px;background:#16121f;color:#fff;border-radius:13px;padding:13px 16px;box-shadow:0 18px 50px rgba(0,0,0,.25);transform:translateY(100px);opacity:0;transition:.25s;z-index:50}.toast.show{transform:none;opacity:1}.overlay{display:none}.mobiletitle{display:none}@media(max-width:1000px){.kpis{grid-template-columns:1fr 1fr}.grid2{grid-template-columns:1fr}.cards3{grid-template-columns:1fr 1fr}.settings{grid-template-columns:1fr}}@media(max-width:720px){.app{display:block}.side{transform:translateX(-102%);transition:.25s}.side.open{transform:none}.main{grid-column:auto}.top{height:70px;padding:0 12px}.burger{display:inline-flex}.top .primary{display:none}.canvas{padding:14px}.headrow{align-items:start;gap:10px}.headrow h2{font-size:25px}.headrow p{font-size:13px}.kpis,.cards3{grid-template-columns:1fr 1fr;gap:9px}.kpi{padding:14px}.kpi strong{font-size:24px}.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:18}.overlay.show{display:block}.mobiletitle{display:block}.settings{grid-template-columns:1fr}}
</style></head><body><div class="app"><aside class="side" id="side"><div class="logo"><a href="index.html"><span class="mark"></span>Gastro<em>Help</em></a></div><div class="restaurant"><span class="avatar">LR</span><div><b>La Reserva</b><small>Restaurante demo</small></div></div><nav class="nav"><button class="active" data-view="dashboard"><span>▦</span>Dashboard</button><button data-view="reservas"><span>✓</span>Reservas<i>24</i></button><button data-view="clientes"><span>♙</span>Clientes</button><button data-view="resenas"><span>★</span>Reseñas<i>6</i></button><button data-view="fidelizacion"><span>◇</span>Fidelización</button><button data-view="rentabilidad"><span>◫</span>Rentabilidad</button><button data-view="estadisticas"><span>↗</span>Estadísticas</button><button data-view="ajustes"><span>⚙</span>Ajustes</button></nav><div class="notice"><b>Entorno demo</b><p>Todos los datos son ficticios. Las acciones de edición están desactivadas.</p></div></aside><div class="overlay" id="overlay"></div><section class="main"><header class="top"><div class="actions"><button class="btn soft burger" id="burger">☰</button><div><span class="env">● Entorno de demostración</span><h1 id="title">Dashboard</h1></div></div><div class="actions"><button class="btn soft action">Activar guía</button><a class="btn primary" href="https://wa.me/34635846049?text=Hola%2C%20he%20visto%20el%20panel%20demo%20y%20quiero%20esto%20en%20mi%20restaurante" target="_blank" style="text-decoration:none">Quiero esto en mi restaurante →</a><span class="circle">JP</span></div></header><main class="canvas" id="canvas"></main></section></div><div class="toast" id="toast">Acción desactivada en el entorno demo</div><script>
const views={dashboard:{name:'Dashboard',sub:'Resumen operativo del restaurante',html:()=>`<div class="headrow"><div><span class="env">Hoy · datos ficticios</span><h2>Buenos días, La Reserva</h2><p>Esto es lo más importante del restaurante ahora mismo.</p></div><button class="btn disabled action">Personalizar panel</button></div><div class="kpis"><div class="kpi"><small>Reservas hoy</small><strong>24</strong><span class="up">↗ 12% frente al martes pasado</span></div><div class="kpi"><small>Ocupación prevista</small><strong>78%</strong><span class="up">Turno de cena</span></div><div class="kpi"><small>Clientes nuevos</small><strong>9</strong><span class="up">↗ 4 esta semana</span></div><div class="kpi"><small>Reseñas pendientes</small><strong>6</strong><span class="down">Requieren seguimiento</span></div></div><div class="grid2"><section class="card"><div class="cardhead"><h3>Reservas de los últimos 7 días</h3><span>Actualizado ahora</span></div><div class="chart"><i data-day="L" style="height:35%"></i><i data-day="M" style="height:52%"></i><i data-day="X" style="height:48%"></i><i data-day="J" style="height:70%"></i><i data-day="V" style="height:61%"></i><i data-day="S" style="height:94%"></i><i data-day="D" style="height:81%"></i></div></section><section class="card"><div class="cardhead"><h3>Actividad reciente</h3><span>En directo</span></div>${[['Nueva reserva web','Hace 2 min'],['Cupón canjeado','Hace 8 min'],['Reseña solicitada','Hace 14 min'],['Cliente recurrente detectado','Hace 21 min']].map(x=>`<div class="activity"><i class="dot"></i><div><b>${x[0]}</b><small>${x[1]}</small></div><span class="tag">Completado</span></div>`).join('')}</section></div>`},reservas:{name:'Reservas',html:()=>tablePage('Reservas del restaurante','Consulta cada turno, canal y estado de reserva.',['Hora','Cliente','Personas','Origen','Estado'],[['13:30','Marta García','4','Web','Confirmada'],['14:00','Luis Romero','2','WhatsApp','Confirmada'],['20:30','Paula Sánchez','6','Teléfono','Pendiente'],['21:00','Carlos Mora','3','Web','Confirmada'],['21:30','Ana Vidal','5','Google','Pendiente'],['22:00','Javier León','2','Manual','Cancelada']])},clientes:{name:'Clientes',html:()=>`<div class="headrow"><div><span class="env">Base de clientes</span><h2>1.284 clientes registrados</h2><p>Historial, recurrencia y oportunidades de recuperación.</p></div><div class="toolbar"><button class="filter action">Filtrar</button><button class="btn primary action">Añadir cliente</button></div></div><div class="cards3"><div class="card metric"><span class="circle">1K</span><div><small>Total</small><h2>1.284</h2></div></div><div class="card metric"><span class="circle">74</span><div><small>Nuevos este mes</small><h2>74</h2></div></div><div class="card metric"><span class="circle">31%</span><div><small>Recurrentes</small><h2>31%</h2></div></div></div><section class="card" style="margin-top:13px"><div class="tablewrap"><table class="table"><thead><tr><th>Cliente</th><th>Última visita</th><th>Visitas</th><th>Gasto estimado</th><th>Estado</th></tr></thead><tbody>${[['Marta García','Hoy','8','412 €','Recurrente'],['Luis Romero','Ayer','3','167 €','Activo'],['Paula Sánchez','Hace 12 días','1','68 €','Nuevo'],['Carlos Mora','Hace 28 días','6','341 €','Recuperable'],['Ana Vidal','Hace 45 días','2','109 €','Recuperable']].map(r=>`<tr><td><div class="profile"><span class="circle">${r[0].split(' ').map(x=>x[0]).join('')}</span><b>${r[0]}</b></div></td>${r.slice(1).map((x,i)=>`<td>${i===3?`<span class="status ${x==='Recurrente'||x==='Activo'?'ok':x==='Nuevo'?'wait':'cancel'}">${x}</span>`:x}</td>`).join('')}</tr>`).join('')}</tbody></table></div></section>`},resenas:{name:'Reseñas',html:()=>`<div class="headrow"><div><span class="env">Reputación</span><h2>Seguimiento de reseñas</h2><p>Solicitudes, respuestas y tareas pendientes después de cada visita.</p></div><button class="btn primary action">Solicitar reseña</button></div><div class="kpis"><div class="kpi"><small>Solicitudes enviadas</small><strong>42</strong><span class="up">Este mes</span></div><div class="kpi"><small>Reseñas recibidas</small><strong>27</strong><span class="up">64% conversión demo</span></div><div class="kpi"><small>Valoración media</small><strong>4,7</strong><span class="up">★★★★★</span></div><div class="kpi"><small>Pendientes</small><strong>6</strong><span class="down">Por responder</span></div></div><section class="card" style="margin-top:13px"><div class="review"><div class="stars">★★★★★</div><b>“Atención rápida y comida excelente.”</b><p>María G. · Hace 2 horas</p><button class="filter action">Responder</button></div><div class="review"><div class="stars">★★★★☆</div><b>“Muy buena experiencia, repetiremos.”</b><p>Álvaro R. · Ayer</p><button class="filter action">Responder</button></div></section>`},fidelizacion:{name:'Fidelización',html:()=>`<div class="headrow"><div><span class="env">Programa de clientes</span><h2>Fidelización y recompensas</h2><p>Puntos, cupones y canjes conectados al historial de visita.</p></div><button class="btn primary action">Nueva recompensa</button></div><div class="cards3"><div class="card reward"><small>Miembros activos</small><h2>386</h2><p>+28 este mes</p><div class="progress"><i style="width:72%"></i></div></div><div class="card reward"><small>Puntos activos</small><h2>18.420</h2><p>Distribuidos entre clientes</p><div class="progress"><i style="width:61%"></i></div></div><div class="card reward"><small>Canjes este mes</small><h2>23</h2><p>Cupones utilizados</p><div class="progress"><i style="width:46%"></i></div></div></div><section class="card" style="margin-top:13px"><div class="cardhead"><h3>Recompensas activas</h3><span>Datos demo</span></div>${[['Postre gratuito','120 puntos','74 canjes'],['10% en próxima visita','180 puntos','41 canjes'],['Copa de vino','90 puntos','35 canjes']].map(x=>`<div class="activity"><span class="circle">◇</span><div><b>${x[0]}</b><small>${x[1]}</small></div><span class="tag">${x[2]}</span></div>`).join('')}</section>`},rentabilidad:{name:'Rentabilidad',html:()=>`<div class="headrow"><div><span class="env">Carta y margen estimado</span><h2>Rentabilidad por plato</h2><p>Comparación demostrativa entre ventas, coste estimado y margen.</p></div><button class="btn primary action">Añadir plato</button></div><div class="kpis"><div class="kpi"><small>Ventas registradas</small><strong>8.940 €</strong><span class="up">Mes actual</span></div><div class="kpi"><small>Coste estimado</small><strong>3.210 €</strong><span>Ingredientes</span></div><div class="kpi"><small>Margen medio</small><strong>64%</strong><span class="up">Estimación</span></div><div class="kpi"><small>Platos analizados</small><strong>38</strong><span>Activos</span></div></div><section class="card" style="margin-top:13px">${[['Arroz meloso','184 ventas','74%'],['Solomillo al vino','126 ventas','68%'],['Pulpo a la brasa','97 ventas','59%'],['Tarta de queso','211 ventas','81%']].map((x,i)=>`<div class="activity"><span class="foodpic"></span><div><b>${x[0]}</b><small>${x[1]}</small><div class="barline"><i style="width:${x[2]}"></i></div></div><strong>${x[2]}</strong></div>`).join('')}</section>`},estadisticas:{name:'Estadísticas',html:()=>`<div class="headrow"><div><span class="env">Evolución mensual</span><h2>Estadísticas del restaurante</h2><p>Compara reservas, clientes, reputación y recurrencia.</p></div><button class="filter action">Exportar informe</button></div><div class="kpis"><div class="kpi"><small>Reservas</small><strong>+12%</strong><span class="up">Frente al mes anterior</span></div><div class="kpi"><small>Clientes</small><strong>+8%</strong><span class="up">74 nuevos</span></div><div class="kpi"><small>Reseñas</small><strong>+14</strong><span class="up">Este mes</span></div><div class="kpi"><small>Repetición</small><strong>+5%</strong><span class="up">Estimación</span></div></div><div class="grid2"><section class="card"><div class="cardhead"><h3>Evolución de reservas</h3><span>Últimos 6 meses</span></div><div class="chart"><i data-day="FEB" style="height:43%"></i><i data-day="MAR" style="height:55%"></i><i data-day="ABR" style="height:61%"></i><i data-day="MAY" style="height:67%"></i><i data-day="JUN" style="height:79%"></i><i data-day="JUL" style="height:91%"></i></div></section><section class="card"><div class="cardhead"><h3>Origen de reservas</h3></div>${[['Web propia','41%'],['WhatsApp','26%'],['Google','18%'],['Teléfono','15%']].map(x=>`<div class="activity"><div><b>${x[0]}</b><div class="barline"><i style="width:${x[1]}"></i></div></div><strong>${x[1]}</strong></div>`).join('')}</section></div>`},ajustes:{name:'Ajustes',html:()=>`<div class="headrow"><div><span class="env">Configuración</span><h2>Ajustes del restaurante</h2><p>Vista demostrativa. Ningún cambio se guarda.</p></div><button class="btn primary action">Guardar cambios</button></div><div class="settings"><section class="card"><div class="cardhead"><h3>Reservas</h3></div><div class="setting"><div><b>Confirmación automática</b><small>Enviar WhatsApp al confirmar</small></div><span class="switch action"></span></div><div class="setting"><div><b>Recordatorio previo</b><small>2 horas antes</small></div><span class="switch action"></span></div><div class="setting"><div><b>Límite por franja</b><small>Control de disponibilidad</small></div><span class="switch action"></span></div></section><section class="card"><div class="cardhead"><h3>Servicios activos</h3></div><div class="setting"><div><b>Fidelización</b><small>Puntos y recompensas</small></div><span class="switch action"></span></div><div class="setting"><div><b>Reseñas automáticas</b><small>Tras la visita</small></div><span class="switch action"></span></div><div class="setting"><div><b>Camarero digital</b><small>Pedidos por QR</small></div><span class="switch action"></span></div></section></div>`}};
function tablePage(h,p,heads,rows){return `<div class="headrow"><div><span class="env">Gestión diaria</span><h2>${h}</h2><p>${p}</p></div><div class="toolbar"><button class="filter action">Filtrar</button><button class="btn primary action">Nueva reserva</button></div></div><section class="card"><div class="tablewrap"><table class="table"><thead><tr>${heads.map(x=>`<th>${x}</th>`).join('')}</tr></thead><tbody>${rows.map(r=>`<tr>${r.map((x,i)=>`<td>${i===4?`<span class="status ${x==='Confirmada'?'ok':x==='Pendiente'?'wait':'cancel'}">${x}</span>`:x}</td>`).join('')}</tr>`).join('')}</tbody></table></div></section>`}
const canvas=document.getElementById('canvas'),title=document.getElementById('title'),toast=document.getElementById('toast'),side=document.getElementById('side'),overlay=document.getElementById('overlay');function bind(){document.querySelectorAll('.action').forEach(b=>b.onclick=e=>{e.preventDefault();toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),1800)})}function show(k){document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('active',b.dataset.view===k));title.textContent=views[k].name;canvas.innerHTML=views[k].html();bind();side.classList.remove('open');overlay.classList.remove('show')}document.querySelectorAll('.nav button').forEach(b=>b.onclick=()=>show(b.dataset.view));burger.onclick=()=>{side.classList.add('open');overlay.classList.add('show')};overlay.onclick=()=>{side.classList.remove('open');overlay.classList.remove('show')};show('dashboard');
</script></body></html>
